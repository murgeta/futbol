<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LA PARCA EVENTOS · Panel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Inter',-apple-system,sans-serif;
      min-height:100vh;
      background:#0a0a0a;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(160,0,0,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(100,0,0,0.12) 0%, transparent 50%);
      padding:2.5rem 1rem;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    body::before {
      content:'';
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
      z-index:0;
    }

    .container { position:relative; z-index:1; width:100%; max-width:820px; }

    /* HEADER */
    .header {
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:12px; margin-bottom:2rem;
      padding-bottom:1.5rem; border-bottom:1px solid rgba(255,255,255,0.07);
    }
    .brand { display:flex; align-items:center; gap:14px; }
    .skull {
      width:44px; height:44px;
      background:linear-gradient(135deg,#c00 0%,#800 100%);
      border-radius:12px; display:flex; align-items:center;
      justify-content:center; font-size:22px;
      box-shadow:0 4px 16px rgba(200,0,0,0.35); flex-shrink:0;
    }
    .brand-name { font-size:1.3rem; font-weight:700; color:#fff; letter-spacing:-0.02em; }
    .brand-name span { color:#e53030; }
    .brand-sub { font-size:0.68rem; color:rgba(255,255,255,0.3); letter-spacing:0.12em; text-transform:uppercase; }
    .header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .admin-badge {
      background:rgba(229,48,48,0.15); border:1px solid rgba(229,48,48,0.4);
      color:#f08080; font-size:0.68rem; padding:4px 12px; border-radius:40px;
      letter-spacing:0.08em; text-transform:uppercase; font-weight:600;
    }
    .employee-badge {
      background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.25);
      color:#4ade80; font-size:0.68rem; padding:4px 12px; border-radius:40px;
      letter-spacing:0.08em; text-transform:uppercase; font-weight:600;
    }

    /* LOGIN MODAL */
    .modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.85); backdrop-filter:blur(4px);
      z-index:100; align-items:center; justify-content:center;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:#141414; border:1px solid rgba(255,255,255,0.1);
      border-radius:18px; padding:2rem; width:100%; max-width:360px;
      box-shadow:0 24px 64px rgba(0,0,0,0.8);
    }
    .modal-title { font-size:1rem; font-weight:600; color:#fff; margin-bottom:6px; }
    .modal-sub { font-size:0.78rem; color:rgba(255,255,255,0.35); margin-bottom:1.5rem; }
    .modal-input {
      width:100%; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; padding:0 14px; height:40px; font-size:0.88rem;
      color:#fff; font-family:inherit; outline:none; margin-bottom:10px;
      transition:border-color 0.2s;
    }
    .modal-input:focus { border-color:rgba(229,48,48,0.5); }
    .modal-input::placeholder { color:rgba(255,255,255,0.2); }
    .modal-error { font-size:0.75rem; color:#f08080; margin-bottom:10px; display:none; }
    .modal-actions { display:flex; gap:8px; }

    /* ADD FORM */
    .add-form {
      display:none; background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.1); border-radius:14px;
      padding:1.2rem 1.5rem; margin-bottom:12px;
    }
    .add-form.open { display:block; }
    .add-form-title { font-size:0.68rem; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:12px; }
    .add-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .add-field { flex:1 1 130px; display:flex; flex-direction:column; gap:5px; }
    .add-label { font-size:0.65rem; color:rgba(255,255,255,0.35); letter-spacing:0.08em; text-transform:uppercase; }
    .add-input {
      background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; padding:0 12px; height:36px; font-size:0.85rem;
      color:#fff; font-family:inherit; outline:none; transition:border-color 0.2s; width:100%;
    }
    .add-input::placeholder { color:rgba(255,255,255,0.2); }
    .add-input:focus { border-color:rgba(229,48,48,0.5); }
    .add-actions { display:flex; gap:8px; }

    /* CARDS */
    .cards { display:flex; flex-direction:column; gap:10px; margin-bottom:1rem; }
    .card {
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
      border-radius:14px; padding:1rem 1.25rem;
      display:flex; align-items:center; gap:16px; flex-wrap:wrap;
      transition:border-color 0.2s, background 0.2s;
    }
    .card:hover { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.14); }
    .card.taken { border-color:rgba(229,48,48,0.2); background:rgba(229,48,48,0.04); }
    .card-left { flex:1 1 200px; }
    .event-name { font-size:0.95rem; font-weight:600; color:#fff; margin-bottom:5px; }
    .event-meta { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
    .meta-item { display:flex; align-items:center; gap:4px; font-size:0.78rem; color:rgba(255,255,255,0.4); }
    .badge-libre {
      display:inline-flex; align-items:center; gap:4px; font-size:0.65rem;
      background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.25);
      color:#4ade80; padding:2px 9px; border-radius:40px; font-weight:500;
      letter-spacing:0.05em; text-transform:uppercase;
    }
    .badge-tomado {
      display:inline-flex; align-items:center; gap:4px; font-size:0.65rem;
      background:rgba(229,48,48,0.1); border:1px solid rgba(229,48,48,0.25);
      color:#f08080; padding:2px 9px; border-radius:40px; font-weight:500;
      letter-spacing:0.05em; text-transform:uppercase;
    }
    .employee-name { font-size:0.8rem; color:rgba(255,255,255,0.45); margin-top:5px; }
    .card-right { display:flex; align-items:center; gap:8px; flex-shrink:0; flex-wrap:wrap; }
    .claim-input {
      background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; padding:0 12px; height:34px; font-size:0.82rem;
      color:#fff; font-family:inherit; outline:none; width:130px;
      transition:border-color 0.2s;
    }
    .claim-input::placeholder { color:rgba(255,255,255,0.2); }
    .claim-input:focus { border-color:rgba(229,48,48,0.5); }
    .claim-input:disabled { opacity:0.3; cursor:not-allowed; }

    /* BUTTONS */
    .btn {
      height:34px; padding:0 14px; border-radius:8px; font-size:0.78rem;
      font-weight:500; cursor:pointer; font-family:inherit; transition:all 0.15s;
      white-space:nowrap; border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.65);
    }
    .btn:hover:not(:disabled) { background:rgba(255,255,255,0.1); color:#fff; }
    .btn:disabled { opacity:0.3; cursor:not-allowed; }
    .btn-primary {
      background:linear-gradient(135deg,#c00 0%,#900 100%); border-color:transparent;
      color:#fff; box-shadow:0 2px 10px rgba(200,0,0,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      background:linear-gradient(135deg,#d00 0%,#a00 100%);
      box-shadow:0 4px 16px rgba(200,0,0,0.45);
    }
    .btn-sm { height:28px; padding:0 10px; font-size:0.72rem; }
    .btn-danger {
      background:rgba(229,48,48,0.1); border:1px solid rgba(229,48,48,0.3);
      color:#f08080;
    }
    .btn-danger:hover:not(:disabled) { background:rgba(229,48,48,0.2); color:#fff; }
    .btn-add {
      width:100%; height:40px; border:1px dashed rgba(255,255,255,0.12);
      background:transparent; color:rgba(255,255,255,0.3); border-radius:12px;
      font-size:0.8rem; cursor:pointer; font-family:inherit; transition:all 0.2s;
      display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:1.5rem;
    }
    .btn-add:hover { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.2); color:rgba(255,255,255,0.5); }

    /* DIVIDER / LOG */
    .divider { height:1px; background:rgba(255,255,255,0.07); margin-bottom:1.5rem; }
    .log-title { font-size:0.65rem; color:rgba(255,255,255,0.25); text-transform:uppercase; letter-spacing:0.12em; font-weight:500; margin-bottom:10px; }
    .log-list { display:flex; flex-direction:column; }
    .log-item {
      display:flex; justify-content:space-between; align-items:center;
      padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.05); gap:12px;
    }
    .log-item:last-child { border-bottom:none; }
    .log-text { font-size:0.82rem; color:rgba(255,255,255,0.4); }
    .log-text strong { color:rgba(255,255,255,0.75); font-weight:600; }
    .log-text em { color:rgba(229,48,48,0.85); font-style:normal; font-weight:500; }
    .log-time { font-size:0.65rem; color:rgba(255,255,255,0.18); white-space:nowrap; flex-shrink:0; }
    .log-empty { font-size:0.82rem; color:rgba(255,255,255,0.2); font-style:italic; padding:8px 0; }

    /* FOOTER */
    .footer { margin-top:2.5rem; text-align:center; font-size:0.65rem; color:rgba(255,255,255,0.12); letter-spacing:0.1em; text-transform:uppercase; }

    @media(max-width:520px){
      .card { flex-direction:column; align-items:flex-start; }
      .card-right { width:100%; }
      .claim-input { flex:1; width:auto; }
    }
  </style>
</head>
<body>

    <!-- MODAL ADMIN LOGIN -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal">
            <div class="modal-title">🔐 Acceso administrador</div>
            <div class="modal-sub">Ingresá la contraseña de La Parca Eventos</div>
            <input class="modal-input" type="password" id="adminPassInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')tryLogin()">
            <div class="modal-error" id="loginError">Contraseña incorrecta.</div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="tryLogin()">Ingresar</button>
                <button class="btn" onclick="closeModal('adminModal')">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL CONFIRMAR BORRAR -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <div class="modal-title">⚠️ Eliminar evento</div>
            <div class="modal-sub" id="deleteModalText">¿Seguro que querés eliminar este evento?</div>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="confirmDelete()">Sí, eliminar</button>
                <button class="btn" onclick="closeModal('deleteModal')">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="container">

        <!-- HEADER -->
        <header class="header">
            <div class="brand">
                <div class="skull">💀</div>
                <div>
                    <div class="brand-name"><span>LA PARCA</span> EVENTOS</div>
                    <div class="brand-sub">Empresa de eventos · GTA Hub</div>
                </div>
            </div>
            <div class="header-right">
                <span id="roleBadge" class="employee-badge">Empleado</span>
                <button class="btn btn-sm" id="adminToggleBtn" onclick="handleAdminToggle()">Modo admin</button>
            </div>
        </header>

        <!-- FORM NUEVO EVENTO (solo admin) -->
        <div class="add-form" id="addForm">
            <div class="add-form-title">+ Nuevo evento</div>
            <div class="add-row">
                <div class="add-field">
                    <label class="add-label">Nombre del evento</label>
                    <input id="newName" class="add-input" placeholder="Ej: Expo Tuning">
                </div>
                <div class="add-field">
                    <label class="add-label">Día y fecha</label>
                    <input id="newDay" class="add-input" placeholder="Ej: Jueves 10/07">
                </div>
                <div class="add-field">
                    <label class="add-label">Hora (ARG)</label>
                    <input id="newTime" class="add-input" placeholder="Ej: 21:00hs">
                </div>
            </div>
            <div class="add-actions">
                <button class="btn btn-primary" onclick="confirmAdd()">Agregar evento</button>
                <button class="btn" onclick="closeAddForm()">Cancelar</button>
            </div>
        </div>

        <!-- CARDS -->
        <div class="cards" id="eventsGrid"></div>

        <!-- BOTON AGREGAR (solo admin) -->
        <button class="btn-add" id="addBtn" onclick="openAddForm()" style="display:none">
            ＋ Agregar evento
        </button>

        <div class="divider"></div>

        <!-- LOG -->
        <div class="log-title">Actividad reciente</div>
        <div class="log-list" id="logList"></div>

        <div class="footer">La Parca Eventos · Sistema interno de empleados</div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ─── CONFIGURACIÓN DE FIREBASE ───────────────────────────────
        // REEMPLAZÁ ESTO CON TUS DATOS DE LA CONSOLA DE FIREBASE
        const firebaseConfig = {
        apiKey: "AIzaSyAyXGayWLqBRZ8zinZDuVW1sYqltA3u87E",
        authDomain: "la-parca-eventos.firebaseapp.com",
        projectId: "la-parca-eventos",
        storageBucket: "la-parca-eventos.firebasestorage.app",
        messagingSenderId: "218322635610",
        appId: "1:218322635610:web:9cb94d9540c72dc78d4163"
        };

        // Inicializar Firebase y Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        // ─────────────────────────────────────────────────────────────

        const ADMIN_PASSWORD = 'laparca2024';
        const SESSION_KEY = 'lp4_admin';

        let isAdmin = false;
        let pendingDeleteId = null;

        // Estructura inicial por si la base de datos está vacía en Firebase
        const defaultEvents = [
        { id: 1, name: 'Expo Tuning', day: 'Lunes 06/07', time: '19:00hs', status: 'libre', employee: '' },
        { id: 2, name: 'Expo Tuning', day: 'Martes 07/07', time: '18:00hs', status: 'libre', employee: '' }
        ];

        // Variables globales para guardar lo que viene de la BD
        let currentEvents = [];
        let currentLog = [];

        function ts() {
        return new Date().toLocaleString('es-AR', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
        }

        // ── ESCUCHA EN TIEMPO REAL DESDE FIREBASE ─────────────────────
        // Guardaremos todo en un documento único dentro de la colección 'parca' llamado 'datos'
        onSnapshot(doc(db, "parca", "datos"), (docSnap) => {
        if (docSnap.exists()) {
        const data = docSnap.data();
        currentEvents = data.events || [];
        currentLog = data.log || [];
        } else {
        // Si es la primera vez, creamos el documento con los eventos por defecto
        currentEvents = defaultEvents;
        currentLog = [];
        setDoc(doc(db, "parca", "datos"), { events: currentEvents, log: currentLog });
        }
        render();
        });

        // Función auxiliar para subir cambios a Firebase
        async function actualizarBaseDeDatos(nuevosEventos, nuevoLog) {
        try {
        await updateDoc(doc(db, "parca", "datos"), {
        events: nuevosEventos,
        log: nuevoLog
        });
        } catch (error) {
        console.error("Error al actualizar Firebase:", error);
        }
        }

        // ── ADMIN AUTH ────────────────────────────────────────────────
        window.handleAdminToggle = function() {
        if (isAdmin) { logoutAdmin(); return; }
        document.getElementById('adminPassInput').value = '';
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('adminModal').classList.add('open');
        setTimeout(() => document.getElementById('adminPassInput').focus(), 100);
        }

        window.tryLogin = function() {
        const val = document.getElementById('adminPassInput').value;
        if (val === ADMIN_PASSWORD) {
        isAdmin = true;
        try { localStorage.setItem(SESSION_KEY, "true"); } catch {}
        closeModal('adminModal');
        applyRole();
        } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('adminPassInput').value = '';
        document.getElementById('adminPassInput').focus();
        }
        }

        function logoutAdmin() {
        isAdmin = false;
        try { localStorage.removeItem(SESSION_KEY); } catch {}
        applyRole();
        }

        function applyRole() {
        document.getElementById('roleBadge').textContent = isAdmin ? 'Administrador' : 'Empleado';
        document.getElementById('roleBadge').className = isAdmin ? 'admin-badge' : 'employee-badge';
        document.getElementById('adminToggleBtn').textContent = isAdmin ? 'Cerrar sesión' : 'Modo admin';
        document.getElementById('addBtn').style.display = isAdmin ? '' : 'none';
        render();
        }

        window.closeModal = function(id) { document.getElementById(id).classList.remove('open'); }

        // ── ADD FORM ──────────────────────────────────────────────────
        window.openAddForm = function() {
        document.getElementById('addForm').classList.add('open');
        document.getElementById('addBtn').style.display = 'none';
        }
        window.closeAddForm = function() {
        document.getElementById('addForm').classList.remove('open');
        document.getElementById('addBtn').style.display = '';
        ['newName', 'newDay', 'newTime'].forEach(id => document.getElementById(id).value = '');
        }
        window.confirmAdd = function() {
        const name = document.getElementById('newName').value.trim();
        const day = document.getElementById('newDay').value.trim();
        const time = document.getElementById('newTime').value.trim();
        if (!name || !day || !time) return;

        const nuevosEventos = [...currentEvents];
        nuevosEventos.push({ id: Date.now(), name, day, time, status: 'libre', employee: '' });

        const nuevoLog = [{ name: 'Admin', action: 'agregó el evento', event: name + ' · ' + day, time: ts() }, ...currentLog];
        if (nuevoLog.length > 40) nuevoLog.pop();

        actualizarBaseDeDatos(nuevosEventos, nuevoLog);
        closeAddForm();
        }

        // ── DELETE ────────────────────────────────────────────────────
        window.askDelete = function(id) {
        const ev = currentEvents.find(e => e.id === id);
        if (!ev) return;
        pendingDeleteId = id;
        document.getElementById('deleteModalText').textContent = '¿Seguro que querés eliminar "' + ev.name + ' · ' + ev.day + '"?';
        document.getElementById('deleteModal').classList.add('open');
        }
        window.confirmDelete = function() {
        if (!pendingDeleteId) return;
        const ev = currentEvents.find(e => e.id === pendingDeleteId);
        const filtered = currentEvents.filter(e => e.id !== pendingDeleteId);

        let nuevoLog = [...currentLog];
        if (ev) {
        nuevoLog.unshift({ name: 'Admin', action: 'eliminó el evento', event: ev.name + ' · ' + ev.day, time: ts() });
        }
        if (nuevoLog.length > 40) nuevoLog.pop();

        actualizarBaseDeDatos(filtered, nuevoLog);
        pendingDeleteId = null;
        closeModal('deleteModal');
        }

        // ── CLAIM / RELEASE ───────────────────────────────────────────
        window.claim = function(id) {
        const input = document.getElementById('inp-' + id);
        const name = input ? input.value.trim() : '';
        if (!name) { if (input) { input.style.borderColor = 'rgba(229,48,48,0.7)'; input.focus(); } return; }

        const nuevosEventos = currentEvents.map(ev => {
        if (ev.id === id && ev.status !== 'tomado') {
        return { ...ev, status: 'tomado', employee: name };
        }
        return ev;
        });

        const evOriginal = currentEvents.find(e => e.id === id);
        if (!evOriginal || evOriginal.status === 'tomado') return;

        const nuevoLog = [{ name, action: 'tomó el turno de', event: evOriginal.name + ' · ' + evOriginal.day, time: ts() }, ...currentLog];
        if (nuevoLog.length > 40) nuevoLog.pop();

        actualizarBaseDeDatos(nuevosEventos, nuevoLog);
        }

        window.release = function(id) {
        if (!isAdmin) return;

        const evOriginal = currentEvents.find(e => e.id === id);
        if (!evOriginal) return;

        const nuevosEventos = currentEvents.map(ev => {
        if (ev.id === id) {
        return { ...ev, status: 'libre', employee: '' };
        }
        return ev;
        });

        const nuevoLog = [{ name: 'Admin', action: 'liberó el turno de', event: evOriginal.name + ' · ' + evOriginal.day + ' (era: ' + evOriginal.employee + ')', time: ts() }, ...currentLog];
        if (nuevoLog.length > 40) nuevoLog.pop();

        actualizarBaseDeDatos(nuevosEventos, nuevoLog);
        }

        // ── RENDER ────────────────────────────────────────────────────
        function render() {
        const grid = document.getElementById('eventsGrid');
        const logList = document.getElementById('logList');
        if(!grid || !logList) return;

        grid.innerHTML = '';

        if (!currentEvents.length) {
        grid.innerHTML = '<div style="text-align:center;padding:2rem;color:rgba(255,255,255,0.2);font-size:0.88rem;">No hay eventos cargados todavía.</div>';
        }

        currentEvents.forEach(ev => {
        const taken = ev.status === 'tomado';
        const card = document.createElement('div');
        card.className = 'card' + (taken ? ' taken' : '');

        let rightHTML = '';
        if (!taken) {
        rightHTML = `
        <input class="claim-input" id="inp-${ev.id}" placeholder="Tu nombre"
        onkeydown="if(event.key==='Enter')window.claim(${ev.id})">
        <button class="btn btn-primary" onclick="window.claim(${ev.id})">Tomar turno</button>
        `;
        } else {
        rightHTML = `<span style="font-size:0.75rem;color:rgba(255,255,255,0.25);">Turno bloqueado</span>`;
        if (isAdmin) {
        rightHTML += `<button class="btn btn-sm btn-danger" onclick="window.release(${ev.id})">Liberar</button>`;
        }
        }

        let deleteBtn = isAdmin
        ? `<button class="btn btn-sm" style="color:rgba(255,48,48,0.5);border-color:rgba(255,48,48,0.15);" onclick="window.askDelete(${ev.id})" title="Eliminar evento">✕</button>`
        : '';

        card.innerHTML = `
        <div class="card-left">
        <div class="event-name">${ev.name}</div>
        <div class="event-meta">
        <span class="meta-item">📅 ${ev.day}</span>
        <span class="meta-item">🕐 ${ev.time}</span>
        </div>
        ${taken
        ? `<span class="badge-tomado">● Tomado</span>
        <div class="employee-name">👤 ${ev.employee}</div>`
        : `<span class="badge-libre">● Disponible</span>`
        }
        </div>
        <div class="card-right">
        ${rightHTML}
        ${deleteBtn}
        </div>
        `;
        grid.appendChild(card);
        });

        logList.innerHTML = '';
        if (!currentLog.length) {
        logList.innerHTML = '<div class="log-empty">Sin actividad todavía.</div>';
        } else {
        currentLog.slice(0, 15).forEach(entry => {
        const item = document.createElement('div');
        item.className = 'log-item';
        item.innerHTML = `
        <span class="log-text"><strong>${entry.name}</strong> ${entry.action} <em>${entry.event}</em></span>
        <span class="log-time">${entry.time}</span>
        `;
        logList.appendChild(item);
        });
        }
        }

        // ── INIT ──────────────────────────────────────────────────────
        document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
        closeModal('adminModal');
        closeModal('deleteModal');
        }
        });

        try {
        if (localStorage.getItem(SESSION_KEY) === "true") { isAdmin = true; }
        } catch {}
        applyRole();
    </script>
</body>
</html>
